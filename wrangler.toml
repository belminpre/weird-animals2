# Cloudflare Worker + Assets (deploys to your existing Worker "weird-animals")
# Deploy: npm run build && npx wrangler deploy

name = "weird-animals"
compatibility_date = "2024-01-01"
main = "dist/_worker.js"

# Prerender: vars here so Worker gets them at runtime (dashboard vars often don't bind on Git deploy).
# Set PRERENDER_TOKEN once: npx wrangler secret put PRERENDER_TOKEN
[vars]
ENABLE_PRERENDER = "true"
PRERENDER_BASE = "https://service.prerender.io"

[assets]
directory = "./dist"
