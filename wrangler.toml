# Cloudflare Worker + Assets (deploys to your existing Worker "weird-animals")
# Deploy: npm run build && npx wrangler deploy

name = "weird-animals"
compatibility_date = "2024-01-01"
main = "dist/_worker.js"

# Prerender staging: token u Workers → weird-animals → Settings → Variables and secrets (Production), ne u Build env.
[vars]
ENABLE_PRERENDER = "true"
PRERENDER_BASE = "https://private-cache.internal.prerender-staging.dev"

[assets]
directory = "./dist"
